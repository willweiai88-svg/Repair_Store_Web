<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center - Sim & Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { neonBlue: '#00f3ff', neonGold: '#fadb5f', darkBg: '#0b0f19' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="antialiased font-sans bg-darkBg text-white selection:bg-neonBlue selection:text-black min-h-screen">

    <nav class="fixed w-full z-50 glass-panel border-b border-white/10 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-wider text-neonBlue">SIM <span
                    class="text-white">&</span> MOBILE</a>
            <div class="flex items-center gap-6">
                <button onclick="logout()"
                    class="bg-transparent border border-red-500 text-red-500 px-5 py-1.5 rounded-full text-xs font-bold hover:bg-red-500 hover:text-white transition shadow-[0_0_10px_rgba(239,68,68,0.2)]">
                    LOGOUT
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-32 pb-20">

        <section id="guest-tracking" class="max-w-2xl mx-auto mb-16 hidden">
            <div class="glass-panel p-8 rounded-3xl border border-neonBlue/30 shadow-[0_0_30px_rgba(0,243,255,0.1)]">
                <h2 class="text-2xl font-black mb-6 uppercase">Track Your <span class="text-neonBlue">Protocol</span>
                </h2>
                <div class="space-y-4">
                    <input type="text" id="track-id" placeholder="Order ID (e.g. 6625...)"
                        class="w-full bg-black/40 border border-gray-700 p-4 rounded-xl focus:border-neonBlue outline-none transition">
                    <input type="tel" id="track-phone" placeholder="Registered Phone Number"
                        class="w-full bg-black/40 border border-gray-700 p-4 rounded-xl focus:border-neonBlue outline-none transition">
                    <button onclick="trackOrder()"
                        class="w-full bg-neonBlue text-black font-black py-4 rounded-xl hover:shadow-[0_0_20px_rgba(0,243,255,0.4)] transition">EXECUTE
                        SEARCH</button>
                </div>
            </div>
        </section>

        <section id="member-dashboard" class="space-y-10">
            <div class="flex flex-col md:flex-row justify-between items-end gap-4">
                <div>
                    <h1 class="text-4xl font-black uppercase tracking-tighter"> <span
                            class="text-neonBlue"> Repair History</span></h1>
                    <p class="text-gray-200 font-mono">UserName: <span id="display-name" class="text-neonBlue">--</span>
                        </p>
                </div>
                <div class="flex gap-4">
                    <div class="glass-panel px-6 py-3 rounded-2xl border-l-4 border-neonGold text-center">
                        <h2 class="text-[10px] text-gray-200 uppercase tracking-widest font-bold">Active Repairs</h2>
                        <p id="stat-active" class="text-xl font-bold">0</p>
                    </div>
                    <div class="glass-panel px-6 py-3 rounded-2xl border-l-4 border-green-500 text-center">
                        <h2 class="text-[10px] text-gray-200 uppercase tracking-widest font-bold">Warranty Safe</h2>
                        <p id="stat-warranty" class="text-xl font-bold">0</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-6" id="orders-container">
                <div class="text-center py-20 opacity-20">
                    <p class="text-4xl mb-4">📂</p>
                    <p>No repair protocols found in your history.</p>
                </div>
            </div>
        </section>
    </main>
    <script src="js/config.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
